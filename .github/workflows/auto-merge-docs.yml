name: Auto-merge docs-only PRs

on:
  pull_request:
    types: [labeled, synchronize]
    branches: [main]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'docs-only')
    steps:
      - uses: actions/checkout@v4

      - name: Fetch changed files
        id: files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          FILES=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/files --jq '.[].filename')
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Validate docs-only changes
        id: validate
        run: |
          ALLOWED='^(README\.md|docs/.*|.*README\.md)$'
          INVALID=""

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if ! echo "$file" | grep -qE "$ALLOWED"; then
              INVALID="$INVALID  - $file"$'\n'
            fi
          done <<< "${{ steps.files.outputs.files }}"

          if [ -n "$INVALID" ]; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Non-docs files found, skipping auto-merge:"
            echo "$INVALID"
          else
            echo "valid=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Squash merge
        if: steps.validate.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" --squash
